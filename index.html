<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="assets/style/style.css" />
    <title>Document</title>
  </head>
  <body>
    <!--Navbar-->
    <section id="navbar">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#"
            ><img src="assets/img/logo.png" alt="logo" width="50" />Infa
            Agency</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-info" type="submit">Search</button>
            </form>
          </div>
        </div>
      </nav>
    </section>
    <!--Jumbotron-->
    <section id="jumbotron">
      <div class="p-5 text-center bg-body-secondary rounded-3">
        <img
          src="assets/img/logo.png"
          class="bi mt-4 mb-3"
          style="color: var(--bs-indigo)"
          width="150"
          aria-hidden="true"
        />

        <h1 class="text-body-emphasis">
          Scoprire il mondo, un viaggio alla volta
        </h1>
        <p class="col-lg-8 mx-auto fs-5 text-muted">
          Non hai una meta? Inizia da qui!
          <strong class="text-info bold">Infa Agency</strong> ti aiuterà a
          trovare ciò che<strong class="text-success bold"> fa per te</strong>!
        </p>
        <div class="d-inline-flex gap-2 mb-5">
          <button
            class="d-inline-flex align-items-center btn btn-info btn-lg px-4 rounded-pill"
            type="button"
          >
            Salpa con noi
          </button>
          <button
            class="btn btn-outline-secondary btn-lg px-4 rounded-pill"
            type="button"
          >
            Contattaci
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
